<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Lekki Stays Admin</title>
    <link rel="stylesheet" href="css/dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <h1>🏨 Lekki Stays Admin</h1>
            </div>
            <div class="nav-actions">
                <div class="admin-info">
                    <span class="admin-name" id="adminName">Admin</span>
                    <span class="admin-role">Administrator</span>
                </div>
                <button class="btn-logout" id="logoutBtn">
                    <i data-lucide="log-out"></i> Logout
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <!-- Stats Overview -->
            <section class="stats-section">
                <h2>📊 Overview</h2>
                <div class="stats-grid">
                    <div class="stat-card stat-pending">
                        <div class="stat-icon">🟡</div>
                        <div class="stat-info">
                            <div class="stat-label">Pending</div>
                            <div class="stat-value" id="statPending">0</div>
                        </div>
                    </div>
                    <div class="stat-card stat-confirmed">
                        <div class="stat-icon">🟢</div>
                        <div class="stat-info">
                            <div class="stat-label">Confirmed</div>
                            <div class="stat-value" id="statConfirmed">0</div>
                        </div>
                    </div>
                    <div class="stat-card stat-paid">
                        <div class="stat-icon">🔵</div>
                        <div class="stat-info">
                            <div class="stat-label">Paid</div>
                            <div class="stat-value" id="statPaid">0</div>
                        </div>
                    </div>
                    <div class="stat-card stat-completed">
                        <div class="stat-icon">✅</div>
                        <div class="stat-info">
                            <div class="stat-label">Completed</div>
                            <div class="stat-value" id="statCompleted">0</div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Bookings List -->
            <section class="bookings-section">
                <div class="section-header">
                    <h2>🔔 Bookings</h2>
                    <button class="btn-refresh" id="refreshBtn">
                        <i data-lucide="refresh-cw"></i> Refresh
                    </button>
                </div>

                <!-- Filters -->
                <div class="filters">
                    <div class="filter-group">
                        <label for="statusFilter">Status:</label>
                        <select id="statusFilter" class="filter-select">
                            <option value="all">All Bookings</option>
                            <option value="pending">Pending</option>
                            <option value="confirmed">Confirmed</option>
                            <option value="paid">Paid</option>
                            <option value="checked-in">Checked In</option>
                            <option value="checked-out">Checked Out</option>
                            <option value="completed">Completed</option>
                            <option value="declined">Declined</option>
                            <option value="cancelled">Cancelled</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label for="searchInput">Search:</label>
                        <input 
                            type="text" 
                            id="searchInput" 
                            class="filter-input" 
                            placeholder="Booking ID, guest name, email..."
                        >
                    </div>
                    <button class="btn-search" id="searchBtn">
                        <i data-lucide="search"></i> Search
                    </button>
                </div>

                <!-- Bookings List -->
                <div class="bookings-list" id="bookingsList">
                    <div class="loading-state">
                        <div class="spinner-large"></div>
                        <p>Loading bookings...</p>
                    </div>
                </div>

                <!-- Pagination -->
                <div class="pagination" id="pagination" style="display: none;">
                    <button class="btn-page" id="prevPage" disabled>
                        <i data-lucide="chevron-left"></i> Previous
                    </button>
                    <span class="page-info" id="pageInfo">Page 1 of 1</span>
                    <button class="btn-page" id="nextPage" disabled>
                        Next <i data-lucide="chevron-right"></i>
                    </button>
                </div>
            </section>
        </div>
    </main>

    <!-- Modals -->
    <div class="modal" id="confirmModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>✅ Confirm Booking</h3>
                <button class="modal-close" onclick="closeModal('confirmModal')">×</button>
            </div>
            <div class="modal-body">
                <p>Are you sure you want to confirm this booking?</p>
                <div class="booking-summary" id="confirmSummary"></div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="sendPaymentCheck" checked>
                        Send payment details to guest via WhatsApp
                    </label>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeModal('confirmModal')">Cancel</button>
                <button class="btn-primary" id="confirmBookingBtn">Confirm & Send Payment</button>
            </div>
        </div>
    </div>

    <div class="modal" id="declineModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>❌ Decline Booking</h3>
                <button class="modal-close" onclick="closeModal('declineModal')">×</button>
            </div>
            <div class="modal-body">
                <p>Are you sure you want to decline this booking?</p>
                <div class="booking-summary" id="declineSummary"></div>
                <div class="form-group">
                    <label for="declineNote">Reason (optional):</label>
                    <textarea id="declineNote" rows="3" placeholder="Enter reason for declining..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeModal('declineModal')">Cancel</button>
                <button class="btn-danger" id="declineBookingBtn">Decline Booking</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/dashboard.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
